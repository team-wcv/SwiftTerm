name: main-source-policy

on:
  pull_request:
    branches:
      - main

jobs:
  enforce:
    name: enforce
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      HOTFIX_ALLOWED_LOGINS: ${{ vars.HOTFIX_ALLOWED_LOGINS }}
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const head = context.payload.pull_request.head.ref;
            const base = context.payload.pull_request.base.ref;
            if (base !== 'main') {
              core.notice(`Skipping because base is ${base}`);
              return;
            }
            if (head === 'develop') {
              core.notice('Allowing develop -> main promotion');
              return;
            }
            if (!head.startsWith('hotfix/')) {
              core.setFailed('Only pull requests from develop or hotfix/* may target main.');
              return;
            }
            const allowed = (process.env.HOTFIX_ALLOWED_LOGINS || 'team-wcv,jw-wcv')
              .split(',')
              .map((value) => value.trim())
              .filter(Boolean);
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            if (!commits.length) {
              core.setFailed('Hotfix pull request has no commits to validate.');
              return;
            }
            const failures = [];
            for (const commit of commits) {
              const sha = commit.sha.slice(0, 7);
              const verification = commit.commit?.verification || {};
              const verified = Boolean(verification.verified);
              const reason = verification.reason || 'unknown';
              const author = commit.author?.login || '';
              const committer = commit.committer?.login || '';
              if (!verified) {
                failures.push(`${sha} is not a GitHub-verified signed commit (${reason}).`);
              }
              if (!allowed.includes(author) && !allowed.includes(committer)) {
                failures.push(`${sha} is not attributed to an allowed hotfix signer. author=${author || 'none'} committer=${committer || 'none'} allowed=${allowed.join(',')}`);
              }
            }
            if (failures.length) {
              core.setFailed(failures.join('\n'));
              return;
            }
            core.notice(`Allowing signed hotfix promotion from ${head}.`);
